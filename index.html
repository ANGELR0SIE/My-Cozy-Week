<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aesthetic Weekly Planner</title>
 <link rel="icon" href="/Weekly-to-do/public/icon.png" />
<link rel="apple-touch-icon" href="/Weekly-to-do/public/icon.png" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Patrick Hand',cursive;
background:#f5eef1;
background-image:
radial-gradient(circle at 20% 20%,rgba(212,148,173,.25) 0%,transparent 30%),
radial-gradient(circle at 80% 80%,rgba(212,148,173,.25) 0%,transparent 30%);
min-height:100vh;
padding:30px;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:100%;
max-width:900px;
}

.paper{
background:#d897b0;
padding:35px;
border-radius:8px;
position:relative;
box-shadow:0 15px 40px rgba(0,0,0,.15);
overflow:hidden;
}

.paper::before{
content:"";
position:absolute;
inset:0;
background-image:
radial-gradient(rgba(255,255,255,.15) 1px, transparent 1px);
background-size:6px 6px;
pointer-events:none;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
gap:20px;
}

.day-select{
padding:10px 15px;
border:none;
font-size:18px;
font-family:'Patrick Hand',cursive;
background:white;
border-radius:10px;
cursor:pointer;
}

.heading{
font-family:'Cormorant Garamond',serif;
font-size:70px;
font-weight:700;
color:white;
text-align:center;
margin-bottom:30px;
letter-spacing:2px;
}

.todo-card{
background:rgba(255,255,255,.92);
padding:25px;
border-radius:8px;
position:relative;
}

.todo-card::before{
content:"";
position:absolute;
top:-12px;
left:25px;
width:90px;
height:25px;
background:#f6d6df;
transform:rotate(-4deg);
box-shadow:0 2px 4px rgba(0,0,0,.1);
}

.todo-item{
display:flex;
align-items:center;
gap:12px;
padding:14px 0;
border-bottom:1px dashed #d5b5c0;
font-size:22px;
}

.todo-item:last-child{
border-bottom:none;
}

input[type="checkbox"]{
width:22px;
height:22px;
accent-color:#d897b0;
cursor:pointer;
}

.footer{
margin-top:35px;
text-align:center;
font-family:'Cormorant Garamond',serif;
font-size:55px;
font-weight:700;
color:white;
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.popup-content{
background:#f8edf1;
padding:40px;
width:90%;
max-width:500px;
border-radius:12px;
text-align:center;
position:relative;
box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.popup-content::before{
content:"";
position:absolute;
top:-15px;
left:50%;
transform:translateX(-50%) rotate(-3deg);
width:140px;
height:30px;
background:#f6d6df;
}

.popup-title{
font-family:'Cormorant Garamond',serif;
font-size:50px;
margin-bottom:10px;
color:#b15d7f;
}

.popup-text{
font-size:24px;
margin-bottom:20px;
}

.close-btn{
padding:10px 25px;
border:none;
background:#d897b0;
color:white;
font-size:20px;
border-radius:8px;
cursor:pointer;
font-family:'Patrick Hand',cursive;
}

.star{
position:absolute;
font-size:70px;
color:white;
opacity:.9;
}

.star1{
top:40px;
left:30px;
}

.star2{
bottom:120px;
right:40px;
}

@media(max-width:768px){

.heading{
font-size:50px;
}

.footer{
font-size:40px;
}

.todo-item{
font-size:18px;
}

.top-bar{
flex-direction:column;
}

}
</style>
</head>
<body>

<div class="container">

<div class="paper">

<div class="star star1">★</div>
<div class="star star2">★</div>

<div class="top-bar">
<h2 style="color:white;">Select Day</h2>

<select id="daySelector" class="day-select">
<option>Sunday</option>
<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
<option>Saturday</option>
</select>
</div>

<div class="heading">
Good Morning
</div>

<div class="todo-card" id="todoContainer">
</div>

<div class="footer">
Good Night
</div>

</div>

</div>

<div class="popup" id="popup">
<div class="popup-content">
<div class="popup-title">Congratulations</div>
<div class="popup-text">
You completed every task today.
<br>
Keep showing up for yourself.
</div>
<button class="close-btn" onclick="closePopup()">
Close
</button>
</div>
</div>

<script>

const weeklyTodos = {

Sunday:[
"Skin Care + Matcha",
"Clean workspace",
"MEM",
"medium",
"Body & Hair care",
"Study(PYQ only)"

],

Monday:[
"Skin Care + Matcha",
"MEM",
"medium",
"Body Care",
"Study(10th)"
],

Tuesday:[
"Skin Care + Matcha + Muringa",
"MEM",
"medium",
"Body & Hair care",
"Study(10th + degree)"
],

Wednesday:[
"Skin Care + Matcha",
"MEM",
"medium",
"Body Care",
"Gardening",
"Study(10th + degree)"
],

Thursday:[
"Skin Care + Matcha + Muringa",
"MEM",
"medium",
"Body Care",
"Study(10th)"
],

Friday:[
"Skin Care + Matcha",
"MEM",
"medium",
"Body Care",
"Study(10th + Degree)"
],

Saturday:[
"Skin Care + Matcha + Muringa",
"MEM",
"medium",
"Body Care- Shaving",
"Study(10th)"
]

};

const daySelector = document.getElementById("daySelector");
const todoContainer = document.getElementById("todoContainer");

// function loadTodos(day){

// const todos = weeklyTodos[day];

// todoContainer.innerHTML = "";

// todos.forEach((todo,index)=>{

// const item = document.createElement("div");

// item.className = "todo-item";

// item.innerHTML = `
// <input type="checkbox" onchange="checkCompletion()">
// <span>${todo}</span>
// `;

// todoContainer.appendChild(item);

// });

// }

// function checkCompletion(){

// const checks = document.querySelectorAll("input[type='checkbox']");
// const checked = document.querySelectorAll("input[type='checkbox']:checked");

// if(checks.length === checked.length && checks.length > 0){
// document.getElementById("popup").style.display="flex";
// }

// }

function loadTodos(day){

const todos = weeklyTodos[day];
todoContainer.innerHTML = "";

const savedState = JSON.parse(
localStorage.getItem(`todos-${day}`)
) || [];

todos.forEach((todo,index)=>{

const checked = savedState[index] || false;

const item = document.createElement("div");

item.className = "todo-item";

item.innerHTML = `
<input
type="checkbox"
${checked ? "checked" : ""}
onchange="checkCompletion()"
data-index="${index}"
>
<span>${todo}</span>
`;

todoContainer.appendChild(item);

});

}

function checkCompletion(){

const day = daySelector.value;

const checks = document.querySelectorAll(
"input[type='checkbox']"
);

const states = [];

checks.forEach(check=>{
states.push(check.checked);
});

localStorage.setItem(
`todos-${day}`,
JSON.stringify(states)
);

const allChecked =
states.length > 0 &&
states.every(state => state);

if(allChecked){

document.getElementById("popup").style.display="flex";

setTimeout(()=>{

const resetStates = states.map(()=>false);

localStorage.setItem(
`todos-${day}`,
JSON.stringify(resetStates)
);

loadTodos(day);

},500);

}

}
function closePopup(){
document.getElementById("popup").style.display="none";
}

daySelector.addEventListener("change",(e)=>{
loadTodos(e.target.value);
});

const today = new Date().toLocaleDateString('en-US',{
weekday:'long'
});

daySelector.value = today;

loadTodos(today);

</script>

</body>
</html>
